<!DOCTYPE html>
<html>
<head>

img {

<body>

<button onclick="chaos()">DO NOT PRESS</button>

<div class="combo">Combo: <span id="combo">0</span></div>

<script>
let combo = 0;
function chaos(){
    combo++;

    document.body.style.background =
        combo % 2 ? "black" : "purple";
}
</script>
